---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - infra.akintoyeopeyemi.info
  resources:
  - s3backups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infra.akintoyeopeyemi.info
  resources:
  - s3backups/finalizers
  verbs:
  - update
- apiGroups:
  - infra.akintoyeopeyemi.info
  resources:
  - s3backups/status
  verbs:
  - get
  - patch
  - update
