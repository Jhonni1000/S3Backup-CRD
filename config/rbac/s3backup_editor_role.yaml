# This rule is not used by the project backup-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the infra.akintoyeopeyemi.info.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: backup-operator
    app.kubernetes.io/managed-by: kustomize
  name: s3backup-editor-role
rules:
- apiGroups:
  - infra.akintoyeopeyemi.info
  resources:
  - s3backups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infra.akintoyeopeyemi.info
  resources:
  - s3backups/status
  verbs:
  - get
